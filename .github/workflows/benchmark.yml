name: Benchmark

on:
  push:
    branches: [main, master]
    paths:
      - 'bench/**'
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'bench/**'
      - 'src/**'
      - 'Dockerfile'
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Benchmark type'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/apibench

jobs:
  # Build API Map from source for testing
  build-apimap:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Map from source
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: apimap:benchmark-test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Export image for downstream jobs
      run: |
        docker save apimap:benchmark-test > /tmp/apimap-benchmark.tar

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: apimap-benchmark-image
        path: /tmp/apimap-benchmark.tar
        retention-days: 1

  # Run quick benchmark on PR/push
  benchmark-quick:
    runs-on: ubuntu-latest
    needs: build-apimap
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Download API Map image
      uses: actions/download-artifact@v4
      with:
        name: apimap-benchmark-image
        path: /tmp

    - name: Load API Map image
      run: |
        docker load < /tmp/apimap-benchmark.tar

    - name: Create logs directory with proper permissions
      run: |
        mkdir -p bench/logs
        chmod -R 777 bench/logs

    - name: Start services and run quick benchmark
      run: |
        cd bench
        # Create .env file for docker-compose
        cat > .env << 'EOF'
        MOCK_SERVER_PORT=9999
        LITELLM_PORT=4000
        APIMAP_PORT=3000
        APIMAP_GUI_PORT=3001
        LITELLM_API_KEY=sk-test-key
        APIMAP_API_KEY=test-key
        MOCK_SERVER_URL=http://mock-server:9999
        EOF
        
        # Start all services in background
        docker compose up -d mock-server litellm apimap
        
        # Wait for services to be healthy
        echo "Waiting for services to be healthy..."
        sleep 10
        
        # Wait for mock-server
        for i in {1..30}; do
          if curl -s http://localhost:9999/health > /dev/null; then
            echo "✅ Mock server is ready"
            break
          fi
          echo "  Waiting for mock-server (attempt $i/30)..."
          sleep 2
        done
        
        # Wait for API Map
        for i in {1..30}; do
          if curl -s http://localhost:3000/v1/models > /dev/null; then
            echo "✅ API Map is ready"
            break
          fi
          echo "  Waiting for API Map (attempt $i/30)..."
          sleep 2
        done
        
        # Wait for LiteLLM
        for i in {1..30}; do
          if curl -s http://localhost:4000/health/liveliness > /dev/null; then
            echo "✅ LiteLLM is ready"
            break
          fi
          echo "  Waiting for LiteLLM (attempt $i/30)..."
          sleep 2
        done
        
        echo ""
        echo "All services are ready! Running benchmark..."
        echo ""
        
        # Run the benchmark
        bun run src/benchmark/index.ts --quick
      env:
        LITELLM_URL: http://localhost:4000
        APIMAP_URL: http://localhost:3000
        MOCK_SERVER_URL: http://localhost:9999
        BENCHMARK_WARMUP: 3
        BENCHMARK_SCENARIOS: "1:30,10:60"

    - name: Cleanup services
      if: always()
      run: |
        cd bench
        docker compose down -v || true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-quick-${{ github.sha }}
        path: |
          bench/results/
          bench/reports/
        retention-days: 30

    - name: Comment PR with results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          let summary = '## 🔬 Benchmark Results (Quick)\n\n';
          
          // Try to read the latest markdown result
          const resultsDir = './bench/results';
          try {
            const files = fs.readdirSync(resultsDir);
            const mdFiles = files.filter(f => f.endsWith('.md')).sort().reverse();
            
            if (mdFiles.length > 0) {
              const content = fs.readFileSync(path.join(resultsDir, mdFiles[0]), 'utf8');
              // Extract summary section
              const summaryMatch = content.match(/## Summary[\s\S]*?(?=##|$)/);
              if (summaryMatch) {
                summary += summaryMatch[0];
              } else {
                summary += content.substring(0, 2000);
              }
            } else {
              summary += 'No results generated.';
            }
          } catch (error) {
            summary += `Error reading results: ${error.message}`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });

    - name: Create step summary
      if: always()
      run: |
        echo "# Quick Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        LATEST_MD=$(ls -t bench/results/*.md 2>/dev/null | head -1)
        if [ -n "$LATEST_MD" ]; then
          cat "$LATEST_MD" >> $GITHUB_STEP_SUMMARY
        fi

  # Run full benchmark weekly or on manual trigger
  benchmark-full:
    runs-on: ubuntu-latest
    needs: build-apimap
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Download API Map image
      uses: actions/download-artifact@v4
      with:
        name: apimap-benchmark-image
        path: /tmp

    - name: Load API Map image
      run: |
        docker load < /tmp/apimap-benchmark.tar

    - name: Create logs directory with proper permissions
      run: |
        mkdir -p bench/logs
        chmod -R 777 bench/logs

    - name: Start services and run full benchmark
      run: |
        cd bench
        # Create .env file for docker-compose
        cat > .env << 'EOF'
        MOCK_SERVER_PORT=9999
        LITELLM_PORT=4000
        APIMAP_PORT=3000
        APIMAP_GUI_PORT=3001
        LITELLM_API_KEY=sk-test-key
        APIMAP_API_KEY=test-key
        MOCK_SERVER_URL=http://mock-server:9999
        EOF
        
        # Start all services in background
        docker compose up -d mock-server litellm apimap
        
        # Wait for services to be healthy
        echo "Waiting for services to be healthy..."
        sleep 10
        
        # Wait for mock-server
        for i in {1..30}; do
          if curl -s http://localhost:9999/health > /dev/null; then
            echo "✅ Mock server is ready"
            break
          fi
          echo "  Waiting for mock-server (attempt $i/30)..."
          sleep 2
        done
        
        # Wait for API Map
        for i in {1..30}; do
          if curl -s http://localhost:3000/v1/models > /dev/null; then
            echo "✅ API Map is ready"
            break
          fi
          echo "  Waiting for API Map (attempt $i/30)..."
          sleep 2
        done
        
        # Wait for LiteLLM
        for i in {1..30}; do
          if curl -s http://localhost:4000/health/liveliness > /dev/null; then
            echo "✅ LiteLLM is ready"
            break
          fi
          echo "  Waiting for LiteLLM (attempt $i/30)..."
          sleep 2
        done
        
        echo ""
        echo "All services are ready! Running benchmark..."
        echo ""
        
        # Run the benchmark
        bun run src/benchmark/index.ts
      env:
        LITELLM_URL: http://localhost:4000
        APIMAP_URL: http://localhost:3000
        MOCK_SERVER_URL: http://localhost:9999

    - name: Cleanup services
      if: always()
      run: |
        cd bench
        docker compose down -v || true

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-full-${{ github.sha }}
        path: |
          bench/results/
          bench/reports/
        retention-days: 90

    - name: Create benchmark report
      if: always()
      run: |
        echo "# Full Benchmark Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Find latest markdown file
        LATEST_MD=$(ls -t bench/results/*.md 2>/dev/null | head -1)
        if [ -n "$LATEST_MD" ]; then
          cat "$LATEST_MD" >> $GITHUB_STEP_SUMMARY
        else
          echo "No results available" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload to GitHub Pages
      if: github.event_name == 'schedule' && always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: bench/reports/

  # Deploy benchmark results to GitHub Pages
  deploy-results:
    runs-on: ubuntu-latest
    needs: benchmark-full
    if: github.event_name == 'schedule' && always()
    
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # Build and push benchmark images
  build-benchmark-images:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - name: Build and push benchmark image
      uses: docker/build-push-action@v6
      with:
        context: ./bench
        file: ./bench/Dockerfile.benchmark
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push mock server image
      uses: docker/build-push-action@v6
      with:
        context: ./bench
        file: ./bench/Dockerfile.mockserver
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mockserver:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mockserver:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
