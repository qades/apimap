# API Map - Docker Compose Configuration
# ============================================================
# Quick start: docker-compose up -d
# 
# Services:
#   - apimap: The API router + Management GUI
#
# Ports:
#   - 3000: API server (OpenAI/Anthropic compatible)
#   - 3001: Management GUI (web interface)
#
# Environment variables:
#   - OPENAI_API_KEY: Your OpenAI API key
#   - ANTHROPIC_API_KEY: Your Anthropic API key
#   - OLLAMA_BASE_URL: Base URL for local Ollama (default: http://host.docker.internal:11434)
#
# Port Mapping / Reverse Proxy:
#   When running behind a reverse proxy or with custom external ports, set:
#   - EXTERNAL_PORT: The external port users access (e.g., 8080)
#   - EXTERNAL_GUI_PORT: The external GUI port users access (e.g., 8081)
#   This ensures the GUI can correctly reach the API.
#
#   Example with custom ports:
#     ports:
#       - "8080:3000"
#       - "8081:3001"
#     environment:
#       - EXTERNAL_PORT=8080
#       - EXTERNAL_GUI_PORT=8081
#
# Volumes:
#   - ./config: Configuration files (persisted)
#   - ./logs: Request logs (persisted)
#
# Permission Setup (IMPORTANT):
#   The container runs as user 'apimap' (UID 1001). You need to ensure
#   the mounted directories are writable by this user:
#
#   Linux/macOS:
#     sudo chown -R 1001:1001 ./config ./logs
#
#   Or make them world-writable (less secure):
#     chmod -R 777 ./config ./logs
#
#   Alternative: Use the install script which handles this:
#     curl -fsSL https://raw.githubusercontent.com/qades/apimap/main/scripts/install.sh | bash
#
# ============================================================

services:
  apimap:
    image: ghcr.io/qades/apimap:latest
    container_name: apimap
    restart: unless-stopped
    ports:
      - "${APIMAN_API_PORT:-3000}:3000"
      - "${APIMAN_GUI_PORT:-3001}:3001"
    environment:
      # API Keys - set these in your environment or .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - ANYSCALE_API_KEY=${ANYSCALE_API_KEY:-}
      
      # Ollama configuration (for local models)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      
      # Port mapping configuration (for reverse proxy scenarios)
      # Set these if the external port differs from internal port
      - EXTERNAL_PORT=${EXTERNAL_PORT:-}
      - EXTERNAL_GUI_PORT=${EXTERNAL_GUI_PORT:-}
      
      # Optional: Override internal ports
      # - API_PORT=3000
      # - GUI_PORT=3001
      
    volumes:
      - ./config:/app/config:rw
      - ./logs:/app/logs:rw
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --no-verbose --tries=1 --spider http://localhost:${API_PORT:-3000}/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# Networks
networks:
  default:
    driver: bridge
