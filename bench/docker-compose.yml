# Docker Compose for LiteLLM vs API Map Benchmark (Bun Edition)
#
# Services:
# 1. Mock LLM Server - Bun + Elysia (lightning fast)
# 2. LiteLLM Proxy - AI gateway with 100+ provider support
# 3. API Map - Universal model router (BUILT FROM LOCAL SOURCE)
#
# Usage (from project root):
#   bun run bench        # Quick benchmark (recommended)
#   bun run bench:full   # Full benchmark suite
#
# Or manual control:
#   docker-compose up -d mock-server litellm apimap
#   cd bench && bun run src/benchmark/index.ts
#   docker-compose down
#
# Configuration:
#   All URLs, ports and service names are defined in .env (single source of truth).

services:
  # Mock LLM Server - Bun + Elysia implementation
  mock-server:
    build:
      context: .
      dockerfile: Dockerfile.mockserver
    container_name: apibench-mock-server
    ports:
      - "${MOCK_SERVER_PORT:-9999}:${MOCK_SERVER_PORT:-9999}"
    volumes:
      - ./logs:/app/logs
    environment:
      - MOCK_SERVER_PORT=${MOCK_SERVER_PORT:-9999}
      - MOCK_SERVER_HOST=0.0.0.0
      # Latency configuration (set to 0 for instant mode)
      # Input processing: fixed at 1000 tokens/sec (1ms/token)
      # Output generation: configurable (default 100 tokens/sec)
      - MOCK_LATENCY_MEAN_MS=${MOCK_LATENCY_MEAN_MS:-0}
      - MOCK_LATENCY_STD_MS=${MOCK_LATENCY_STD_MS:-0}
      - MOCK_TOKENS_PER_SEC=${MOCK_TOKENS_PER_SEC:-100}
      # Set to 'true' for instant mode (no latency at all)
      - MOCK_INSTANT_MODE=${MOCK_INSTANT_MODE:-false}
      # Error simulation rate (0.0 - 1.0)
      - MOCK_ERROR_RATE=${MOCK_ERROR_RATE:-0.01}
      # Max context length in tokens
      - MOCK_MAX_CONTEXT=${MOCK_MAX_CONTEXT:-8192}
      # Enable/disable streaming
      - MOCK_STREAMING_ENABLED=${MOCK_STREAMING_ENABLED:-true}
    command: >
      sh -c "mkdir -p /app/logs && exec bun run src/mock-server/index.ts 2>/app/logs/mock-server-stderr.log"
    healthcheck:
      test: ["CMD", "sh", "-c", "bun -e \"fetch('http://localhost:${MOCK_SERVER_PORT:-9999}/health').then(r => process.exit(r.ok ? 0 : 1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # LiteLLM Proxy Server
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: apibench-litellm
    ports:
      - "${LITELLM_PORT:-4000}:${LITELLM_PORT:-4000}"
    volumes:
      - ./configs/litellm_config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_API_KEY:-sk-test-key}
      - OPENAI_API_KEY=mock-key
      - ANTHROPIC_API_KEY=mock-key
      - MOCK_SERVER_URL=${MOCK_SERVER_URL:-http://mock-server:9999}
    command: ["--config", "/app/config.yaml", "--port", "${LITELLM_PORT:-4000}", "--host", "0.0.0.0"]
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${LITELLM_PORT:-4000}/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Map Router - BUILT FROM LOCAL SOURCE
  # This builds from the parent directory (..) using the project's Dockerfile.
  # For CI testing published images, use docker-compose.ci.yml override.
  apimap:
    build:
      context: ..
      dockerfile: Dockerfile
    image: apibench-apimap:local
    container_name: apibench-apimap
    ports:
      - "${APIMAP_PORT:-3000}:3000"
      - "${APIMAP_GUI_PORT:-3001}:3001"
    volumes:
      - ./configs/apimap_config.template.yaml:/app/config/config.yaml.template:ro
      - apimap-logs:/app/logs
    environment:
      - NODE_ENV=production
      - API_PORT=3000
      - GUI_PORT=3001
      - EXTERNAL_PORT=${EXTERNAL_PORT:-3000}
      - EXTERNAL_GUI_PORT=${EXTERNAL_GUI_PORT:-3001}
      - OPENAI_API_KEY=mock-key
      - ANTHROPIC_API_KEY=mock-key
      - MOCK_SERVER_URL=${MOCK_SERVER_URL:-http://mock-server:9999}
      - MOCK_SERVER_API_BASE=${MOCK_SERVER_API_BASE:-http://mock-server:9999/v1}
      - CONFIG_PATH=/tmp/config.yaml
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed -e "s|__MOCK_SERVER_URL__|$$MOCK_SERVER_URL|g" -e "s|__MOCK_SERVER_API_BASE__|$$MOCK_SERVER_API_BASE|g" /app/config/config.yaml.template > /tmp/config.yaml && exec /usr/local/bin/docker-entrypoint.sh
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget --quiet --tries=1 --spider http://localhost:3000/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Benchmark Runner - Bun implementation
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    container_name: apibench-runner
    volumes:
      - ./results:/app/results
      - ./reports:/app/reports
    environment:
      - LITELLM_URL=${LITELLM_URL:-http://litellm:4000}
      - APIMAP_URL=${APIMAP_URL:-http://apimap:3000}
      - MOCK_SERVER_URL=${MOCK_SERVER_URL:-http://mock-server:9999}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-sk-test-key}
      - APIMAP_API_KEY=${APIMAP_API_KEY:-test-key}
      # Benchmark configuration
      - BENCHMARK_WARMUP=${BENCHMARK_WARMUP:-5}
      # Scenarios: "concurrency:requests,concurrency:requests,..."
      # Supports up to 100 concurrency
      - BENCHMARK_SCENARIOS=${BENCHMARK_SCENARIOS:-1:50,10:100,50:200,100:300}
      # Prompt/Context sizes (chars)
      - BENCHMARK_PROMPT_SIZE=${BENCHMARK_PROMPT_SIZE:-100}
      - BENCHMARK_CONTEXT_SIZE=${BENCHMARK_CONTEXT_SIZE:-0}
      - BENCHMARK_MAX_TOKENS=${BENCHMARK_MAX_TOKENS:-50}
      - WAIT_FOR_SERVICES=true
    depends_on:
      mock-server:
        condition: service_healthy
      litellm:
        condition: service_healthy
      apimap:
        condition: service_healthy
    networks:
      - apibench-network
    profiles:
      - benchmark
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Visualization Generator (Python for matplotlib compatibility)
  visualize:
    image: python:3.11-slim
    container_name: apibench-visualize
    volumes:
      - ./results:/app/results
      - ./reports:/app/reports
      - ./visualize.py:/app/visualize.py:ro
    working_dir: /app
    command: >
      bash -c "pip install -q matplotlib numpy && 
               python visualize.py results/ --output /app/reports/benchmark_report.pdf"
    profiles:
      - visualize
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  apibench-network:
    driver: bridge

volumes:
  apimap-logs:
