# Docker Compose for LiteLLM vs API Map Benchmark (Bun Edition)
#
# Services:
# 1. Mock LLM Server - Bun + Elysia (lightning fast)
# 2. LiteLLM Proxy - AI gateway with 100+ provider support
# 3. API Map - Universal model router (volume-mapped for development)
#
# Usage (from project root):
#   bun run bench        # Quick benchmark (recommended)
#   bun run bench:full   # Full benchmark suite
#
# Or manual control:
#   docker-compose up -d mock-server litellm apimap
#   cd bench && bun run src/benchmark/index.ts
#   docker-compose down
#
# Configuration:
#   All URLs, ports and service names are defined in .env (single source of truth).

services:
  # Mock LLM Server - Bun + Elysia implementation
  # Volume-mapped for development - no rebuild needed on code changes
  mock-server:
    image: oven/bun:1-alpine
    container_name: apibench-mock-server
    working_dir: /app
    ports:
      - "${MOCK_SERVER_PORT:-9999}:${MOCK_SERVER_PORT:-9999}"
    volumes:
      - ./package.json:/app/package.json:ro
      - ./bun.lock:/app/bun.lock:ro
      - ./src/mock-server:/app/src/mock-server:ro
      - ./logs:/app/logs
    environment:
      - MOCK_SERVER_PORT=${MOCK_SERVER_PORT:-9999}
      - MOCK_SERVER_HOST=0.0.0.0
      - MOCK_LATENCY_MEAN_MS=${MOCK_LATENCY_MEAN_MS}
      - MOCK_LATENCY_STD_MS=${MOCK_LATENCY_STD_MS}
      - MOCK_TOKENS_PER_SEC=${MOCK_TOKENS_PER_SEC}
      - MOCK_INSTANT_MODE=${MOCK_INSTANT_MODE}
      - MOCK_ERROR_RATE=${MOCK_ERROR_RATE}
      - MOCK_MAX_CONTEXT=${MOCK_MAX_CONTEXT}
      - MOCK_STREAMING_ENABLED=${MOCK_STREAMING_ENABLED}
    command: >
      sh -c "mkdir -p /app/logs && 
             bun install --frozen-lockfile 2>/dev/null && 
             exec bun run src/mock-server/index.ts 2>/app/logs/mock-server-stderr.log"
    healthcheck:
      test: ["CMD", "sh", "-c", "bun -e \"fetch('http://localhost:${MOCK_SERVER_PORT:-9999}/health').then(r => process.exit(r.ok ? 0 : 1))\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL for LiteLLM
  litellm-db:
    image: postgres:16-alpine
    container_name: apibench-litellm-db
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U litellm"]
      interval: 1s
      timeout: 5s
      retries: 10
    networks:
      - apibench-network

  # LiteLLM Proxy Server
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: apibench-litellm
    ports:
      - "${LITELLM_PORT:-4000}:${LITELLM_PORT:-4000}"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_API_KEY:-sk-test-key}
      - OPENAI_API_KEY=mock-key
      - ANTHROPIC_API_KEY=mock-key
      - MOCK_SERVER_URL=${MOCK_SERVER_URL:-http://mock-server:9999}
      #- DATABASE_URL=postgresql://litellm:litellm@litellm-db:5432/litellm
      #- STORE_MODEL_IN_DB=True
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /tmp/config.yaml << 'EOF'
        model_list:
          - model_name: gpt-4o-mini
            litellm_params:
              model: openai/gpt-4o-mini
              api_base: http://mock-server:9999/v1
              api_key: mock-key
          - model_name: gpt-4o
            litellm_params:
              model: openai/gpt-4o
              api_base: http://mock-server:9999/v1
              api_key: mock-key
          - model_name: claude-3-haiku
            litellm_params:
              model: anthropic/claude-3-haiku-20240307
              api_base: http://mock-server:9999
              api_key: mock-key
          - model_name: claude-3-opus
            litellm_params:
              model: anthropic/claude-3-opus-20240229
              api_base: http://mock-server:9999
              api_key: mock-key
        litellm_settings:
          drop_params: True
          telemetry: False
        router_settings:
          routing_strategy: simple-shuffle
          timeout: 30
        general_settings:
          master_key: ${LITELLM_API_KEY:-sk-test-key}
        health_check:
          enabled: True
        EOF
        exec litellm --config /tmp/config.yaml --port ${LITELLM_PORT:-4000} --host 0.0.0.0
    depends_on:
      mock-server:
        condition: service_healthy
#      litellm-db:
#        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${LITELLM_PORT:-4000}/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Map Router - Volume-mapped for development
  # Uses a dev-friendly image that supports hot-reloading via volume mounts
  apimap:
    build:
      context: ..
      dockerfile: bench/Dockerfile.apimap.dev
    image: apibench-apimap:dev
    container_name: apibench-apimap
    ports:
      - "${APIMAP_PORT:-3000}:3000"
      - "${APIMAP_GUI_PORT:-3001}:3001"
    volumes:
      # Mount source code for development (hot-reload without rebuild)
      - ../src:/app/src:ro
      - ../package.json:/app/package.json:ro
      - ../bun.lock:/app/bun.lock:ro
      - ../gui/package.json:/app/gui/package.json:ro
      - ../gui/bun.lock:/app/gui/bun.lock:ro
      - ../gui/build:/app/gui/build:ro
      - ../docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ./configs/apimap_config.template.yaml:/app/config/config.yaml.template:ro
      - apimap-logs:/app/logs
    environment:
      - NODE_ENV=development
      - API_PORT=3000
      - GUI_PORT=3001
      - EXTERNAL_PORT=${EXTERNAL_PORT:-3000}
      - EXTERNAL_GUI_PORT=${EXTERNAL_GUI_PORT:-3001}
      - OPENAI_API_KEY=mock-key
      - ANTHROPIC_API_KEY=mock-key
      - MOCK_SERVER_URL=${MOCK_SERVER_URL:-http://mock-server:9999}
      - CONFIG_PATH=/tmp/config.yaml
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed -e "s|__MOCK_SERVER_URL__|$$MOCK_SERVER_URL|g" /app/config/config.yaml.template > /tmp/config.yaml && sh /usr/local/bin/docker-entrypoint.sh
    depends_on:
      mock-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O /dev/null http://localhost:3000/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Benchmark Runner - Volume-mapped for development
  # Uses bun image directly with volume mounts - no rebuild needed on code changes
  benchmark:
    image: oven/bun:1-alpine
    container_name: apibench-runner
    working_dir: /app
    volumes:
      - ./package.json:/app/package.json:ro
      - ./bun.lock:/app/bun.lock:ro
      - ./src:/app/src:ro
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
      - ./container-entrypoint.sh:/app/container-entrypoint.sh:ro
      - ./results:/app/results
      - ./reports:/app/reports
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      # All benchmark params have defaults in Dockerfile; override here
      - WAIT_FOR_SERVICES=true
    # Entrypoint wrapper - handles dependency install and passes through CLI args
    entrypoint: ["/bin/sh", "/app/container-entrypoint.sh"]
    profiles:
      - benchmark
    depends_on:
      mock-server:
        condition: service_healthy
      litellm:
        condition: service_healthy
      apimap:
        condition: service_healthy
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Visualization Generator (Python for matplotlib compatibility)
  visualize:
    image: python:3.11-slim
    container_name: apibench-visualize
    volumes:
      - ./results:/app/results
      - ./reports:/app/reports
      - ./visualize.py:/app/visualize.py:ro
    working_dir: /app
    command: >
      bash -c "pip install -q matplotlib numpy && 
               python visualize.py results/"
    profiles:
      - visualize
    networks:
      - apibench-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  apibench-network:
    driver: bridge

volumes:
  apimap-logs:
